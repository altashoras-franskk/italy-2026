// REDUCER

function reducer(state, action) {
  switch (action.type) {
    case "ADD_NODE": {
      if (state.nodes.find((n) => n.id === action.node.id)) return state;
      return { ...state, nodes: [...state.nodes, action.node] };
    }
    case "ADD_EDGE": {
      const dup = state.edges.find((e) => (e.s === action.edge.s && e.t === action.edge.t) || (e.s === action.edge.t && e.t === action.edge.s));
      if (dup) return state;
      return { ...state, edges: [...state.edges, action.edge] };
    }
    case "UPDATE_NODE":
      return { ...state, nodes: state.nodes.map((n) => n.id === action.id ? { ...n, ...action.fields } : n) };
    case "REMOVE_NODE":
      return { ...state, nodes: state.nodes.filter((n) => n.id !== action.id), edges: state.edges.filter((e) => e.s !== action.id && e.t !== action.id) };
    case "REMOVE_EDGE":
      return { ...state, edges: state.edges.filter((_, i) => i !== action.index) };
    case "LOAD": return action.state;
    default: return state;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// PARTICLES — subtle monochrome flowing energy
// ═══════════════════════════════════════════════════════════════════════════════

function Particles({ edges, pos, tf, nodes }) {
  const ref = useRef(null);
  const pts = useRef([]);
  const raf = useRef(null);

  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d");
    const resize = () => { c.width = c.parentElement?.clientWidth || 800; c.height = c.parentElement?.clientHeight || 600; };
    resize();

    const draw = () => {
      ctx.clearRect(0, 0, c.width, c.height);
      ctx.save(); ctx.translate(tf.x, tf.y); ctx.scale(tf.k, tf.k);

      if (pts.current.length < 60 && edges.length > 0) {
        const e = edges[Math.floor(Math.random() * edges.length)];
        const a = pos[e.s], b = pos[e.t];
        if (a && b) {
          pts.current.push({ ax: a.x, ay: a.y, bx: b.x, by: b.y, p: 0, sp: 0.002 + Math.random() * 0.005, life: 1, str: e.str || 1 });
        }
      }

      pts.current = pts.current.filter((p) => p.life > 0);
      pts.current.forEach((p) => {
        p.p += p.sp; if (p.p >= 1) { p.p = 0; p.life -= 0.12; }
        const x = p.ax + (p.bx - p.ax) * p.p, y = p.ay + (p.by - p.ay) * p.p;
        const a = Math.min(p.life, 0.5) * (0.15 + p.str * 0.08);
        ctx.beginPath(); ctx.arc(x, y, 0.8 + p.str * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,0,0,${a})`; ctx.fill();
      });

      ctx.restore();
      raf.current = requestAnimationFrame(draw);
    };
    raf.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf.current);
  }, [edges.length, pos, tf]);

  return <canvas ref={ref} className="absolute inset-0 pointer-events-none" style={{ zIndex: 1 }} />;
}

function EditField({ label, value, onChange, multi, mono }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value || "");
  useEffect(() => setVal(value || ""), [value]);
  const save = () => { onChange(val); setEditing(false); };
  const cls = `w-full bg-gray-50 text-gray-700 rounded px-3 py-2 text-xs border border-gray-200 outline-none focus:border-gray-400 ${mono ? "" : ""}`;
  if (editing) return (
    <div className="mb-4">
      {label && <h4 className="text-gray-400 text-[10px] uppercase tracking-widest mb-1.5" style={{ fontFamily: MONO }}>{label}</h4>}
      {multi ? <textarea value={val} onChange={(e) => setVal(e.target.value)} className={`${cls} h-32 resize-none`} style={{ fontFamily: mono ? MONO : "inherit" }} /> :
        <input value={val} onChange={(e) => setVal(e.target.value)} className={cls} style={{ fontFamily: mono ? MONO : "inherit" }} />}
      <div className="flex gap-2 mt-1.5">
        <button onClick={save} className="px-3 py-1 text-[10px] text-gray-600 border border-gray-300 rounded hover:bg-gray-50 uppercase tracking-wider" style={{ fontFamily: MONO }}>ok</button>
        <button onClick={() => setEditing(false)} className="px-3 py-1 text-[10px] text-gray-400 border border-gray-200 rounded hover:bg-gray-50" style={{ fontFamily: MONO }}>cancelar</button>
      </div>
    </div>
  );
  return (
    <div className="mb-4 group cursor-text" onClick={() => setEditing(true)}>
      {label && <h4 className="text-gray-400 text-[10px] uppercase tracking-widest mb-1.5 flex items-center gap-1" style={{ fontFamily: MONO }}>{label} <span className="opacity-0 group-hover:opacity-40 text-[8px]">edit</span></h4>}
      <div className={`text-gray-600 text-sm leading-relaxed hover:bg-gray-50 rounded p-1.5 -m-1.5 transition-colors ${mono ? "text-xs" : ""}`} style={{ fontFamily: mono ? MONO : "inherit" }}>
        {value || <span className="text-gray-300 italic text-xs">clique para editar...</span>}
      </div>
    </div>
  );
}

function Detail({ node, edges, nodes, dispatch, onClose, onConnect, onRemove }) {
  const col = GC[node.group] || "#666";
  const badge = SB[node.status];
  const conns = edges.filter((e) => e.s === node.id || e.t === node.id);
  const upd = (fields) => dispatch({ type: "UPDATE_NODE", id: node.id, fields });
  const groups = Object.keys(GC);
  const statuses = Object.keys(SB);

  return (
    <div className="w-80 bg-white border-l border-gray-200 overflow-y-auto flex-none">
      <div className="p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            <select value={node.group} onChange={(e) => upd({ group: e.target.value })}
              className="text-[10px] px-2 py-0.5 rounded bg-transparent border border-gray-200 outline-none cursor-pointer uppercase tracking-widest"
              style={{ color: col, fontFamily: MONO }}>
              {groups.map((g) => <option key={g} value={g} style={{ color: GC[g] }}>{GL[g] || g}</option>)}
            </select>
          </div>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-600 text-lg leading-none">&times;</button>
        </div>

        <EditField label="" value={node.label} onChange={(v) => upd({ label: v })} />
        <EditField label="subtítulo" value={node.subtitle} onChange={(v) => upd({ subtitle: v })} />

        <div className="mb-4 flex items-center gap-2">
          <h4 className="text-gray-400 text-[10px] uppercase tracking-widest" style={{ fontFamily: MONO }}>status</h4>
          <div className="flex gap-1">
            {statuses.map((s) => (
              <button key={s} onClick={() => upd({ status: s })}
                className={`px-2 py-0.5 rounded text-[10px] tracking-wider transition-all ${node.status === s ? "opacity-100" : "opacity-30 hover:opacity-60"}`}
                style={{ backgroundColor: `${SB[s].c}12`, color: SB[s].c, border: `1px solid ${SB[s].c}30`, fontFamily: MONO }}>{SB[s].l}</button>
            ))}
          </div>
        </div>

        <EditField label="teoria" value={node.theory} onChange={(v) => upd({ theory: v })} multi />
        <EditField label="na T4P" value={node.t4p} onChange={(v) => upd({ t4p: v })} multi />
        <EditField label="citação" value={node.quote} onChange={(v) => upd({ quote: v })} mono />
        <EditField label="referências" value={(node.keyWorks || []).join("\n")} onChange={(v) => upd({ keyWorks: v.split("\n").filter(Boolean) })} multi mono />

        <div className="mb-4">
          <h4 className="text-gray-400 text-[10px] uppercase tracking-widest mb-1.5" style={{ fontFamily: MONO }}>peso</h4>
          <div className="flex items-center gap-2">
            <input type="range" min="1" max="10" value={node.weight || 5}
              onChange={(e) => upd({ weight: parseInt(e.target.value) })}
              className="flex-1 h-1 appearance-none bg-gray-100 rounded-full cursor-pointer"
              style={{ accentColor: col }} />
            <span className="text-[10px] text-gray-400 w-8 text-right" style={{ fontFamily: MONO }}>{node.weight || 5}/10</span>
          </div>
        </div>

        <div className="mb-4">
          <h4 className="text-gray-400 text-[10px] uppercase tracking-widest mb-2" style={{ fontFamily: MONO }}>conexões ({conns.length})</h4>
          <div className="space-y-0.5">
            {conns.map((e, i) => {
              const oid = e.s === node.id ? e.t : e.s;
              const o = nodes.find((n) => n.id === oid);
              const eIdx = edges.indexOf(e);
              return o ? (
                <div key={i} className="flex items-center gap-2 text-xs p-1.5 rounded hover:bg-gray-50 group">
                  <span className="w-1.5 h-1.5 rounded-full flex-none" style={{ backgroundColor: GC[o.group] || "#666" }} />
                  <span className="text-gray-600 flex-1 truncate text-[11px]">{o.label}</span>
                  {e.label && <span className="text-gray-300 text-[9px] truncate max-w-20" style={{ fontFamily: MONO }}>{e.label}</span>}
                  <button onClick={() => dispatch({ type: "REMOVE_EDGE", index: eIdx })}
                    className="opacity-0 group-hover:opacity-40 hover:opacity-100 text-red-400 text-[9px]">&times;</button>
                </div>
              ) : null;
            })}
          </div>
        </div>

        <div className="space-y-2 pt-3 border-t border-gray-100">
          <button onClick={() => onConnect(node.id)}
            className="w-full py-1.5 text-[10px] text-gray-500 rounded border border-gray-200 hover:bg-gray-50 uppercase tracking-widest transition-colors" style={{ fontFamily: MONO }}>conectar</button>
          <button onClick={() => onRemove(node.id)}
            className="w-full py-1.5 text-[10px] text-gray-400 rounded border border-gray-100 hover:border-red-200 hover:text-red-400 uppercase tracking-widest transition-colors" style={{ fontFamily: MONO }}>remover</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// RIZOMA TAB — white background, thin strokes, no glow
// ═══════════════════════════════════════════════════════════════════════════════

function Rizoma({ state, dispatch }) {
  const svgRef = useRef(null);
  const simRef = useRef(null);
  const [sel, setSel] = useState(null);
  const [hov, setHov] = useState(null);
  const [hovE, setHovE] = useState(null);
  const [pos, setPos] = useState({});
  const [adding, setAdding] = useState(null);
  const [connecting, setConnecting] = useState(null);
  const [filter, setFilter] = useState("all");
  const [tf, setTf] = useState({ x: 0, y: 0, k: 1 });
  const [tick, setTick] = useState(0);
  const [emergences, setEmergences] = useState([]);
  const [drag, setDrag] = useState(null);

  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 50); return () => clearInterval(id); }, []);

  useEffect(() => {
    if (simRef.current) simRef.current.stop();
    const nodes = state.nodes.map((n) => ({ ...n, x: pos[n.id]?.x ?? 400 + (Math.random() - 0.5) * 400, y: pos[n.id]?.y ?? 300 + (Math.random() - 0.5) * 300 }));
    const links = state.edges.map((e) => ({ source: e.s, target: e.t, str: e.str }));

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id((d) => d.id).distance((d) => 140 - (d.str || 1) * 12).strength((d) => 0.05 + (d.str || 1) * 0.03))
      .force("charge", d3.forceManyBody().strength((d) => -70 - (d.weight || 5) * 12))
      .force("center", d3.forceCenter(400, 300).strength(0.006))
      .force("collision", d3.forceCollide((d) => 16 + (d.weight || 5) * 1.5))
      .alphaDecay(0.006).velocityDecay(0.35).alphaMin(0.0005);

    simRef.current = sim;
    let frame;
    const loop = () => {
      const p = {}; sim.nodes().forEach((n) => { p[n.id] = { x: n.x, y: n.y }; }); setPos({ ...p });
      const ns = sim.nodes();
      const clusters = []; const visited = new Set();
      ns.forEach((n) => {
        if (visited.has(n.id)) return;
        const cl = [n]; visited.add(n.id);
        ns.forEach((m) => { if (m.id !== n.id && !visited.has(m.id) && Math.hypot(n.x - m.x, n.y - m.y) < 55) { cl.push(m); visited.add(m.id); } });
        if (cl.length >= 3) clusters.push({ x: cl.reduce((s, c) => s + c.x, 0) / cl.length, y: cl.reduce((s, c) => s + c.y, 0) / cl.length, n: cl.length });
      });
      setEmergences(clusters);
      if (sim.alpha() > 0.0005) frame = requestAnimationFrame(loop);
    };
    frame = requestAnimationFrame(loop);
    return () => { sim.stop(); cancelAnimationFrame(frame); };
  }, [state.nodes.length, state.edges.length]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    const zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => setTf({ x: e.transform.x, y: e.transform.y, k: e.transform.k }));
    svg.call(zoom); return () => svg.on(".zoom", null);
  }, []);

  const startDrag = (e, nid) => { e.stopPropagation(); setDrag(nid); };
  useEffect(() => {
    if (!drag) return;
    const move = (e) => {
      const sim = simRef.current; if (!sim) return;
      const node = sim.nodes().find((n) => n.id === drag);
      if (node) { node.fx = (e.clientX - tf.x) / tf.k; node.fy = (e.clientY - tf.y - 40) / tf.k; sim.alpha(0.08).restart(); }
    };
    const up = () => {
      const sim = simRef.current; if (sim) { const node = sim.nodes().find((n) => n.id === drag); if (node) { node.fx = null; node.fy = null; } }
      setDrag(null);
    };
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
  }, [drag, tf]);

  const filtered = filter === "all" ? state.nodes : state.nodes.filter((n) => n.group === filter);
  const fIds = new Set(filtered.map((n) => n.id));
  const visE = state.edges.filter((e) => fIds.has(e.s) && fIds.has(e.t));
  const selNode = state.nodes.find((n) => n.id === sel);
  const hovNode = state.nodes.find((n) => n.id === hov);
  const cc = {}; state.edges.forEach((e) => { cc[e.s] = (cc[e.s] || 0) + 1; cc[e.t] = (cc[e.t] || 0) + 1; });
  const groups = ["all", ...new Set(state.nodes.map((n) => n.group))];

  return (
    <div className="flex h-full">
      <div className="flex-1 relative" style={{ backgroundColor: "#fafafa" }}>
        <Particles edges={visE} pos={pos} tf={tf} nodes={state.nodes} />

        <div className="absolute top-3 left-3 z-10 flex items-center gap-2">
          <button onClick={() => setAdding({ label: "", note: "" })}
            className="px-3 py-1.5 text-[10px] text-gray-500 border border-gray-300 rounded hover:bg-white uppercase tracking-widest transition-colors"
            style={{ fontFamily: MONO }}>+ conceito</button>
          {connecting && (
            <span className="px-3 py-1.5 text-[10px] text-gray-600 border border-gray-400 rounded animate-pulse tracking-wider" style={{ fontFamily: MONO }}>
              conectando: {state.nodes.find((n) => n.id === connecting)?.label}
              <button onClick={() => setConnecting(null)} className="ml-2 text-gray-400">&times;</button>
            </span>
          )}
        </div>

        <div className="absolute top-3 right-3 z-10 flex items-center gap-1 flex-wrap">
          {groups.map((g) => (
            <button key={g} onClick={() => setFilter(g)}
              className={`px-2 py-1 text-[10px] rounded transition-all uppercase tracking-widest ${filter === g ? "text-gray-800 bg-white shadow-sm" : "text-gray-400 hover:text-gray-600"}`}
              style={{ fontFamily: MONO, border: filter === g ? `1px solid ${GC[g] || "#ccc"}` : "1px solid transparent" }}>
              {g === "all" ? "todos" : GL[g] || g}
            </button>
          ))}
        </div>

        {adding && (
          <div className="absolute inset-0 z-20 flex items-center justify-center" style={{ backgroundColor: "rgba(255,255,255,0.85)" }}>
            <div className="bg-white border border-gray-200 rounded-lg p-6 w-80 shadow-lg">
              <h3 className="text-gray-700 text-sm mb-4 uppercase tracking-widest" style={{ fontFamily: MONO }}>novo conceito</h3>
              <input value={adding.label} onChange={(e) => setAdding({ ...adding, label: e.target.value })} placeholder="nome"
                className="w-full bg-gray-50 text-gray-700 rounded px-3 py-2 text-sm mb-2 border border-gray-200 outline-none focus:border-gray-400" style={{ fontFamily: MONO }} />
              <textarea value={adding.note} onChange={(e) => setAdding({ ...adding, note: e.target.value })} placeholder="conteúdo teórico..."
                className="w-full bg-gray-50 text-gray-600 rounded px-3 py-2 text-sm mb-4 border border-gray-200 outline-none focus:border-gray-400 h-24 resize-none" />
              <div className="flex gap-2">
                <button onClick={() => { if (adding.label.trim()) { dispatch({ type: "ADD_NODE", node: { id: `c-${Date.now()}`, label: adding.label.toLowerCase(), group: "custom", theory: adding.note, subtitle: "", weight: 4, status: "hipótese" } }); setAdding(null); } }}
                  className="flex-1 py-2 text-[10px] text-gray-600 border border-gray-300 rounded hover:bg-gray-50 uppercase tracking-widest" style={{ fontFamily: MONO }}>adicionar</button>
                <button onClick={() => setAdding(null)}
                  className="px-4 py-2 text-[10px] text-gray-400 border border-gray-200 rounded hover:bg-gray-50 uppercase tracking-widest" style={{ fontFamily: MONO }}>cancelar</button>
              </div>
            </div>
          </div>
        )}

        {hovNode && !sel && pos[hovNode.id] && (
          <div className="absolute z-10 pointer-events-none px-3 py-2 bg-white border border-gray-200 rounded max-w-72 shadow-md"
            style={{ left: Math.min(pos[hovNode.id].x * tf.k + tf.x + 20, 600), top: pos[hovNode.id].y * tf.k + tf.y - 10 }}>
            <p className="text-gray-700 text-xs" style={{ fontFamily: MONO }}>{hovNode.label}</p>
            {hovNode.subtitle && <p className="text-gray-400 text-[10px] mt-0.5">{hovNode.subtitle}</p>}
            {hovNode.theory && <p className="text-gray-400 text-[10px] mt-1 leading-relaxed">{hovNode.theory.slice(0, 120)}...</p>}
            <p className="text-gray-300 text-[10px] mt-1" style={{ fontFamily: MONO }}>{cc[hovNode.id] || 0} conexões · peso {hovNode.weight}/10</p>
          </div>
        )}

        <svg ref={svgRef} width="100%" height="100%" className={drag ? "cursor-grabbing" : "cursor-grab"} style={{ position: "relative", zIndex: 2 }}>
          <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`}>
            {emergences.map((em, i) => (
              <g key={`em-${i}`}>
                <circle cx={em.x} cy={em.y} r={18 + em.n * 7} fill="none" stroke="#999" strokeWidth={0.4}
                  opacity={0.15 + Math.sin(tick * 0.03 + i) * 0.05} strokeDasharray="3 6" />
                <text x={em.x} y={em.y - 18 - em.n * 7} textAnchor="middle" fill="#aaa" fontSize={6.5} opacity={0.35} fontFamily={MONO} style={{ letterSpacing: "0.08em" }}>emergência ({em.n})</text>
              </g>
            ))}

            {visE.map((e, i) => {
              const a = pos[e.s], b = pos[e.t]; if (!a || !b) return null;
              const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2, isH = hovE === i, str = e.str || 1;
              return (
                <g key={`e-${i}`} onMouseEnter={() => setHovE(i)} onMouseLeave={() => setHovE(null)}>
                  <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={isH ? "#555" : "#ccc"} strokeWidth={isH ? 1.2 : 0.3 + str * 0.15} opacity={isH ? 0.6 : 0.2 + str * 0.05} />
                  {isH && e.label && (
                    <g>
                      <rect x={mx - e.label.length * 2.2 - 4} y={my - 13} width={e.label.length * 4.4 + 8} height={13} rx={2} fill="white" fillOpacity={0.95} stroke="#ddd" strokeWidth={0.5} />
                      <text x={mx} y={my - 4} textAnchor="middle" fill="#666" fontSize={7} fontFamily={MONO} style={{ letterSpacing: "0.03em" }}>{e.label}</text>
                    </g>
                  )}
                </g>
              );
            })}

            {filtered.map((n) => {
              const p = pos[n.id]; if (!p) return null;
              const isSel = sel === n.id, isH = hov === n.id;
              const col = GC[n.group] || "#666";
              const w = n.weight || 5, r = 5 + w * 1.1 + (cc[n.id] || 0) * 0.4;
              const badge = SB[n.status];

              return (
                <g key={n.id} transform={`translate(${p.x},${p.y})`} style={{ cursor: drag === n.id ? "grabbing" : "pointer" }}
                  onMouseEnter={() => !drag && setHov(n.id)} onMouseLeave={() => setHov(null)}
                  onMouseDown={(e) => startDrag(e, n.id)}
                  onClick={() => { if (drag) return; if (connecting && connecting !== n.id) { dispatch({ type: "ADD_EDGE", edge: { s: connecting, t: n.id, label: "", str: 1 } }); setConnecting(null); } else setSel(isSel ? null : n.id); }}>
                  {isSel && <circle r={r + 4} fill="none" stroke={col} strokeWidth={0.8} opacity={0.4} strokeDasharray="2 3" />}
                  {isH && !isSel && <circle r={r + 3} fill="none" stroke={col} strokeWidth={0.5} opacity={0.25} />}
                  <circle r={r} fill={isH || isSel ? `${col}18` : `${col}0a`} stroke={col} strokeWidth={isSel ? 1.5 : isH ? 1 : 0.6} />
                  {n.theory && n.theory.length > 30 && <circle r={1.5} fill={col} opacity={0.4} />}
                  <text y={r + 10} textAnchor="middle" fill={isH || isSel ? "#333" : "#777"} fontSize={w >= 8 ? 8 : 7} fontFamily={MONO}
                    style={{ pointerEvents: "none", letterSpacing: "0.04em" }}>{n.label}</text>
                  {badge && w >= 7 && <text y={-r - 3} textAnchor="middle" fill={badge.c} fontSize={5.5} fontFamily={MONO} opacity={0.4}
                    style={{ pointerEvents: "none", letterSpacing: "0.1em" }}>{badge.l}</text>}
                </g>
              );
            })}
          </g>
        </svg>

        <div className="absolute bottom-3 left-3 z-10 flex items-center gap-3 text-gray-400 text-[10px] tracking-wider" style={{ fontFamily: MONO }}>
          <span>{state.nodes.length} conceitos</span><span>{state.edges.length} conexões</span>
          {emergences.length > 0 && <span className="text-gray-500">{emergences.length} emergências</span>}
        </div>
      </div>

      {selNode && <Detail node={selNode} edges={state.edges} nodes={state.nodes} dispatch={dispatch}
        onClose={() => setSel(null)} onConnect={(id) => { setConnecting(id); setSel(null); }}
        onRemove={(id) => { dispatch({ type: "REMOVE_NODE", id }); setSel(null); }} />}
    </div>
  );
}

// MEMORY MAP — clean geometric nodes on white
// ═══════════════════════════════════════════════════════════════════════════════

function Memory({ memories, nodes }) {
  const [filter, setFilter] = useState("all");
  const [sel, setSel] = useState(null);
  const svgRef = useRef(null);
  const [pos, setPos] = useState({});
  const [tf, setTf] = useState({ x: 0, y: 0, k: 1 });
  const [tick, setTick] = useState(0);

  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 60); return () => clearInterval(id); }, []);

  const filtered = filter === "all" ? memories : memories.filter((m) => m.type === filter);

  useEffect(() => {
    const mNodes = memories.map((m, i) => ({ id: m.id, x: 120 + (i % 5) * 130, y: 80 + Math.floor(i / 5) * 110 }));
    const cIds = new Set(); memories.forEach((m) => m.conns?.forEach((c) => cIds.add(c)));
    const cNodes = [...cIds].map((c) => ({ id: `r-${c}`, x: Math.random() * 600 + 80, y: Math.random() * 400 + 40 }));
    const links = []; memories.forEach((m) => m.conns?.forEach((c) => { if (cIds.has(c)) links.push({ source: m.id, target: `r-${c}` }); }));

    const sim = d3.forceSimulation([...mNodes, ...cNodes])
      .force("link", d3.forceLink(links).id((d) => d.id).distance(75).strength(0.2))
      .force("charge", d3.forceManyBody().strength(-120))
      .force("center", d3.forceCenter(380, 250))
      .force("collision", d3.forceCollide(26)).alphaDecay(0.02);

    let frame;
    const loop = () => { const p = {}; sim.nodes().forEach((n) => { p[n.id] = { x: n.x, y: n.y }; }); setPos({ ...p }); if (sim.alpha() > 0.002) frame = requestAnimationFrame(loop); };
    frame = requestAnimationFrame(loop);
    return () => { sim.stop(); cancelAnimationFrame(frame); };
  }, [memories.length]);

  useEffect(() => {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => setTf({ x: e.transform.x, y: e.transform.y, k: e.transform.k }));
    svg.call(zoom); return () => svg.on(".zoom", null);
  }, []);

  const selMem = memories.find((m) => m.id === sel);
  const types = ["all", ...new Set(memories.map((m) => m.type))];
  const cIds = new Set(); memories.forEach((m) => m.conns?.forEach((c) => cIds.add(c)));

  return (
    <div className="flex h-full">
      <div className="flex-1 relative" style={{ backgroundColor: "#fafafa" }}>
        <div className="absolute top-3 left-3 z-10 flex items-center gap-1 flex-wrap">
          {types.map((t) => (
            <button key={t} onClick={() => setFilter(t)}
              className={`px-2 py-1 text-[10px] rounded transition-all uppercase tracking-widest ${filter === t ? "text-gray-700 bg-white shadow-sm" : "text-gray-400 hover:text-gray-600"}`}
              style={{ fontFamily: MONO, border: filter === t ? `1px solid ${MC[t] || "#ccc"}` : "1px solid transparent" }}>
              {t === "all" ? "todos" : t}
            </button>
          ))}
        </div>

        <svg ref={svgRef} width="100%" height="100%" className="cursor-grab">
          <g transform={`translate(${tf.x},${tf.y}) scale(${tf.k})`}>
            {memories.map((m) => (m.conns || []).map((c) => {
              const a = pos[m.id], b = pos[`r-${c}`]; if (!a || !b) return null;
              return <line key={`${m.id}-${c}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#ccc" strokeWidth={0.5} opacity={0.2 + Math.sin(tick * 0.03 + m.id.charCodeAt(1)) * 0.05} strokeDasharray="3 5" />;
            }))}

            {[...cIds].map((cId) => {
              const p = pos[`r-${cId}`]; const concept = nodes.find((n) => n.id === cId); if (!p || !concept) return null;
              return (
                <g key={`r-${cId}`} transform={`translate(${p.x},${p.y})`}>
                  <circle r={8} fill="none" stroke={GC[concept.group] || "#ccc"} strokeWidth={0.4} strokeDasharray="2 3" opacity={0.35} />
                  <text y={15} textAnchor="middle" fill={GC[concept.group] || "#999"} fontSize={6.5} fontFamily={MONO} opacity={0.4} style={{ letterSpacing: "0.04em" }}>{concept.label}</text>
                </g>
              );
            })}

            {filtered.map((m) => {
              const p = pos[m.id]; if (!p) return null;
              const col = MC[m.type] || "#666"; const isSel = sel === m.id;
              const agent = AGENTS.find((a) => a.id === m.by);
              return (
                <g key={m.id} transform={`translate(${p.x},${p.y})`} style={{ cursor: "pointer" }} onClick={() => setSel(isSel ? null : m.id)}>
                  {isSel && <rect x={-28} y={-12} width={56} height={24} rx={2} fill="none" stroke={col} strokeWidth={1} opacity={0.4} />}
                  <rect x={-24} y={-9} width={48} height={18} rx={2} fill="white" stroke={col} strokeWidth={isSel ? 1 : 0.5} />
                  <text textAnchor="middle" dominantBaseline="central" fill={col} fontSize={6.5} fontFamily={MONO} style={{ pointerEvents: "none", letterSpacing: "0.08em" }}>{m.type.slice(0, 6)}</text>
                  <text y={20} textAnchor="middle" fill="#888" fontSize={6.5} fontFamily={MONO} style={{ pointerEvents: "none", letterSpacing: "0.02em" }}>{m.label.length > 22 ? m.label.slice(0, 20) + "..." : m.label}</text>
                  {agent && <text y={-15} textAnchor="middle" fontSize={9} fill={col} fontFamily={MONO} style={{ pointerEvents: "none" }}>{agent.emoji}</text>}
                </g>
              );
            })}
          </g>
        </svg>

        <div className="absolute bottom-3 left-3 z-10 text-gray-400 text-[10px] tracking-wider" style={{ fontFamily: MONO }}>{memories.length} registros · {[...cIds].length} conceitos</div>
      </div>

      {selMem && (
        <div className="w-80 bg-white border-l border-gray-200 overflow-y-auto flex-none">
          <div className="p-5">
            <div className="flex items-center justify-between mb-3">
              <span className="text-[10px] px-2 py-0.5 rounded border uppercase tracking-widest"
                style={{ borderColor: `${MC[selMem.type]}40`, color: MC[selMem.type], fontFamily: MONO }}>{selMem.type}</span>
              <button onClick={() => setSel(null)} className="text-gray-300 hover:text-gray-600 leading-none">&times;</button>
            </div>
            <h3 className="text-gray-700 text-sm mb-3" style={{ fontFamily: MONO }}>{selMem.label}</h3>
            <p className="text-gray-500 text-sm leading-relaxed mb-4">{selMem.content}</p>
            <div className="flex items-center gap-2 text-[10px] text-gray-400 mb-4" style={{ fontFamily: MONO }}>
              <span style={{ color: MC[selMem.type] }}>{AGENTS.find((a) => a.id === selMem.by)?.emoji}</span>
              <span>{AGENTS.find((a) => a.id === selMem.by)?.label}</span>
              <span className="text-gray-200">·</span>
              <span>{selMem.date}</span>
            </div>
            {selMem.conns?.length > 0 && (
              <div>
                <h4 className="text-gray-400 text-[10px] uppercase tracking-widest mb-2" style={{ fontFamily: MONO }}>conceitos</h4>
                {selMem.conns.map((c) => {
                  const concept = nodes.find((n) => n.id === c);
                  return (
                    <div key={c} className="flex items-center gap-2 text-xs p-1.5 rounded hover:bg-gray-50">
                      <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: GC[concept?.group] || "#ccc" }} />
                      <span className="text-gray-500 text-[11px]">{concept?.label || c}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    // STANDALONE: localStorage persistence + reset
    // ═══════════════════════════════════════════════════════════════════════════════

    const STORAGE_KEY = "mindhive-dashboard-v6";

    function loadState(key, fallback) {
      try {
        const d = localStorage.getItem(`${STORAGE_KEY}-${key}`);
        return d ? JSON.parse(d) : fallback;
      } catch { return fallback; }
    }

    function saveState(key, data) {
      try { localStorage.setItem(`${STORAGE_KEY}-${key}`, JSON.stringify(data)); } catch {}
    }

    function resetAll() {
      if (confirm("resetar tudo para o estado original? edições serão perdidas.")) {
        localStorage.removeItem(`${STORAGE_KEY}-graph`);
        localStorage.removeItem(`${STORAGE_KEY}-paper`);
        window.location.reload();
      }
    }

    // Wrap the main component with persistence
    function MindhiveDashboardPersistent() {
      const [tab, setTab] = useState("rizoma");
      const [state, dispatch] = useReducer(reducer, null, () => loadState("graph", { nodes: CONCEPTS, edges: EDGES }));
      const [memories] = useState(MEMORIES);
      const [paper, setPaper] = useState(() => loadState("paper", PAPER_INIT));

      useEffect(() => { saveState("graph", state); }, [state]);
      useEffect(() => { saveState("paper", paper); }, [paper]);

      const updateSection = (id, fields) => {
        setPaper((prev) => prev.map((s) => s.id === id ? { ...s, ...fields } : s));
      };

      return (
        <div className="w-full h-screen bg-white text-gray-700 flex flex-col overflow-hidden" style={{ fontFamily: MONO }}>
          <div className="flex-none border-b border-gray-200">
            <div className="flex items-center justify-between px-5 py-2.5">
              <div className="flex items-center gap-3">
                <div className="w-1.5 h-1.5 rounded-full bg-gray-700" />
                <span className="text-[11px] text-gray-700 uppercase tracking-widest" style={{ fontFamily: MONO }}>mindhive</span>
                <span className="text-gray-300 text-[10px] tracking-wider" style={{ fontFamily: MONO }}>pesquisa recursiva aplicada</span>
              </div>
              <div className="flex items-center gap-0.5">
                {[{ id: "rizoma", label: "rizoma" }, { id: "paper", label: "paper" }, { id: "memory", label: "memória" }].map((t) => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={`px-4 py-1.5 text-[10px] rounded transition-all uppercase tracking-widest ${tab === t.id ? "bg-gray-100 text-gray-700" : "text-gray-400 hover:text-gray-600"}`}
                    style={{ fontFamily: MONO }}>{t.label}</button>
                ))}
              </div>
              <div className="flex items-center gap-3">
                <span className="text-[10px] text-gray-300 tracking-wider" style={{ fontFamily: MONO }}>{state.nodes.length}n · {state.edges.length}e · {memories.length}m</span>
                <button onClick={resetAll} className="text-[9px] text-gray-300 hover:text-gray-500 tracking-widest uppercase transition-colors" style={{ fontFamily: MONO }}>reset</button>
              </div>
            </div>
          </div>
          <div className="flex-1 overflow-hidden">
            {tab === "rizoma" && <Rizoma state={state} dispatch={dispatch} />}
            {tab === "paper" && <Paper sections={paper} onUpdate={updateSection} nodes={state.nodes} />}
            {tab === "memory" && <Memory memories={memories} nodes={state.nodes} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(MindhiveDashboardPersistent)
    );
  </script>
</body>
</html>
